<h1>Inecuaciones</h1>

<section class="card">
<h2>Reglas clave</h2>
<p>Si multiplicas o divides por negativo → cambia el signo</p>
</section>

<section class="card">
<h2>Ejemplo</h2>
<div class="code">
-2x > 6  
x < -3
</div>
</section>

<section class="card">
<h2>Cuadráticas</h2>
<div class="code">
x² - 1 > 0  
(x-1)(x+1) > 0  
x < -1 o x > 1
</div>
</section>
